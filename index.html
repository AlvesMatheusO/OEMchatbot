<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AutoFlex — Consulta de Peças OEM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-void: #0d0f12;
        --bg-shell: #13161b;
        --bg-card: #1a1e26;
        --bg-input: #1e2330;
        --bg-hover: #252a36;
        --border: #2a2f3d;
        --border-hot: #f59e0b;
        --amber: #f59e0b;
        --amber-dim: #b45309;
        --amber-glow: rgba(245, 158, 11, 0.12);
        --text-hi: #f0f2f5;
        --text-mid: #8b93a8;
        --text-lo: #4a5168;
        --green: #22c55e;
        --red: #ef4444;
        --blue: #3b82f6;
        --bubble-bot: #1a1e26;
        --bubble-user: #1e2a1a;
        --bubble-user-border: #2d4a22;
        --radius: 6px;
        --font-display: "Barlow Condensed", sans-serif;
        --font-body: "Barlow", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        background: var(--bg-void);
        color: var(--text-hi);
        font-family: var(--font-body);
        font-size: 15px;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        max-width: 820px;
        margin: 0 auto;
        background: var(--bg-shell);
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
      }

      /* ── HEADER ── */
      header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 18px;
        height: 58px;
        background: var(--bg-card);
        border-bottom: 2px solid var(--amber);
        flex-shrink: 0;
      }
      .logo-mark {
        width: 36px; height: 36px;
        background: var(--amber);
        border-radius: 4px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .logo-mark svg { width: 22px; height: 22px; fill: #000; }
      .header-info { flex: 1; }
      .header-title {
        font-family: var(--font-display);
        font-size: 20px; font-weight: 700;
        letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--text-hi); line-height: 1;
      }
      .header-sub {
        font-size: 11px; color: var(--text-mid);
        font-family: var(--font-mono); letter-spacing: 0.04em; margin-top: 2px;
      }
      .status-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--green); box-shadow: 0 0 8px var(--green);
        animation: pulse 2s ease-in-out infinite; flex-shrink: 0;
      }
      #status-label {
        font-size: 10px; font-family: var(--font-mono);
        color: var(--text-mid); flex-shrink: 0;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
      }

      /* ── ACTION BAR — botões fixos ── */
      #action-bar {
        display: flex;
        gap: 6px;
        padding: 8px 14px;
        background: var(--bg-void);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }
      #action-bar::-webkit-scrollbar { display: none; }

      .action-group {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }

      /* Separador vertical entre grupos */
      .action-sep {
        width: 1px;
        background: var(--border);
        margin: 4px 4px;
        flex-shrink: 0;
      }

      .act-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-mid);
        font-family: var(--font-mono);
        font-size: 11px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        flex-shrink: 0;
        user-select: none;
        line-height: 1;
      }
      .act-btn:hover {
        border-color: var(--amber);
        color: var(--amber);
        background: var(--amber-glow);
      }
      .act-btn:active { transform: scale(0.95); }

      /* Variante: botão de ação pós-detalhe (contexto) */
      .act-btn.ctx {
        border-color: var(--amber-dim);
        color: var(--amber);
        background: var(--amber-glow);
      }
      .act-btn.ctx:hover {
        border-color: var(--amber);
        background: rgba(245,158,11,0.2);
      }

      /* Variante: destructive / reiniciar */
      .act-btn.danger:hover {
        border-color: var(--red);
        color: var(--red);
        background: rgba(239,68,68,0.1);
      }

      .act-btn .icon { font-size: 13px; line-height: 1; }

      /* ── CHAT ── */
      #chat {
        flex: 1; overflow-y: auto;
        padding: 18px 16px;
        display: flex; flex-direction: column; gap: 14px;
        scroll-behavior: smooth;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      #chat::-webkit-scrollbar { width: 4px; }
      #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      /* ── MESSAGES ── */
      .msg {
        display: flex; flex-direction: column;
        max-width: 88%;
        animation: msgIn 0.2s ease-out;
      }
      @keyframes msgIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .msg.bot  { align-self: flex-start; }
      .msg.user { align-self: flex-end; }
      .msg-label {
        font-size: 10px; font-family: var(--font-mono);
        letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px;
      }
      .msg.bot  .msg-label { color: var(--amber-dim); padding-left: 2px; }
      .msg.user .msg-label { color: var(--text-lo); text-align: right; padding-right: 2px; }

      .bubble {
        padding: 12px 14px; border-radius: var(--radius);
        line-height: 1.55; word-break: break-word; white-space: pre-wrap;
      }
      .msg.bot  .bubble {
        background: var(--bubble-bot);
        border: 1px solid var(--border);
        border-left: 3px solid var(--amber);
        color: var(--text-hi); font-size: 14px;
      }
      .msg.user .bubble {
        background: var(--bubble-user);
        border: 1px solid var(--bubble-user-border);
        color: var(--text-hi); font-size: 14px;
      }
      .bubble img { max-width: 200px; border-radius: 4px; display: block; margin-bottom: 6px; }

      /* Typing */
      .typing-indicator {
        display: flex; gap: 4px; padding: 10px 14px;
        background: var(--bubble-bot);
        border: 1px solid var(--border); border-left: 3px solid var(--amber);
        border-radius: var(--radius); width: fit-content;
      }
      .typing-indicator span {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--amber); animation: typing 1.2s ease-in-out infinite;
      }
      .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
      .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes typing {
        0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
        40%           { opacity: 1;   transform: scale(1); }
      }

      /* ── INPUT AREA ── */
      #input-area {
        background: var(--bg-card);
        border-top: 1px solid var(--border);
        padding: 10px 14px;
        flex-shrink: 0;
        padding-bottom: max(10px, env(safe-area-inset-bottom));
      }
      .input-row { display: flex; align-items: flex-end; gap: 8px; }

      #user-input {
        flex: 1; background: var(--bg-input);
        border: 1px solid var(--border); border-radius: var(--radius);
        color: var(--text-hi); font-family: var(--font-body); font-size: 15px;
        padding: 10px 14px; resize: none; line-height: 1.4;
        min-height: 42px; max-height: 120px; outline: none;
        transition: border-color 0.15s; scrollbar-width: none;
      }
      #user-input::-webkit-scrollbar { display: none; }
      #user-input:focus { border-color: var(--amber); }
      #user-input::placeholder { color: var(--text-lo); }

      #send-btn {
        width: 42px; height: 42px; border-radius: var(--radius);
        background: var(--amber); border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; transition: background 0.15s, transform 0.1s;
      }
      #send-btn:hover { background: #fbbf24; }
      #send-btn:active { transform: scale(0.94); }
      #send-btn svg { width: 18px; height: 18px; fill: #000; }
      #send-btn:disabled { background: var(--bg-hover); cursor: not-allowed; }
      #send-btn:disabled svg { fill: var(--text-lo); }

      /* ── ERROR BANNER ── */
      #error-banner {
        display: none; background: #2a1010;
        border: 1px solid var(--red); color: #fca5a5;
        font-size: 12px; font-family: var(--font-mono);
        padding: 8px 16px; text-align: center; flex-shrink: 0;
      }
      #error-banner.show { display: block; }

      /* ── TOAST ── */
      #toast {
        position: fixed; bottom: 90px; left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--bg-card); border: 1px solid var(--amber);
        color: var(--amber); font-size: 13px; font-family: var(--font-mono);
        padding: 8px 16px; border-radius: 20px;
        opacity: 0; pointer-events: none;
        transition: opacity 0.2s, transform 0.2s;
        z-index: 50; white-space: nowrap;
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      @media (max-width: 480px) {
        #action-bar { padding: 7px 10px; }
        .act-btn { padding: 6px 10px; font-size: 10.5px; }
        #chat { padding: 14px 10px; }
        #input-area { padding: 8px 10px; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
        .msg { max-width: 95%; }
        .bubble { font-size: 13.5px; }
      }
    </style>
  </head>
  <body>
    <div id="app">

      <header>
        <div class="logo-mark">
          <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
          </svg>
        </div>
        <div class="header-info">
          <div class="header-title">AutoFlex OEM</div>
          <div class="header-sub">Consulta de peças · Catálogo inteligente</div>
        </div>
        <span id="status-label">online</span>
        <div class="status-dot" id="status-dot"></div>
      </header>

      <div id="error-banner">
        ⚠️ Sem conexão com o servidor. Verifique se <code>python app.py</code> está rodando.
      </div>

      <!-- ── ACTION BAR — botões fixos ── -->
      <div id="action-bar">

        <!-- Navegação -->
        <div class="action-group">
          <button class="act-btn" onclick="sendQuick('menu')" title="Voltar ao menu principal">
            <span class="icon">🏠</span> Menu
          </button>
          <button class="act-btn" onclick="sendQuick('/voltar')" title="Voltar etapa anterior">
            <span class="icon">↩</span> Voltar
          </button>
          <button class="act-btn danger" onclick="sendQuick('/reiniciar')" title="Reiniciar conversa">
            <span class="icon">🔄</span> Reiniciar
          </button>
        </div>

        <div class="action-sep"></div>

        <!-- Pós-seleção de peça -->
        <div class="action-group" id="ctx-buttons">
          <button class="act-btn ctx" onclick="sendQuick('1')" title="Ver veículos compatíveis">
            <span class="icon">🚗</span> Aplicação
          </button>
          <button class="act-btn ctx" onclick="sendQuick('2')" title="Ver peças similares">
            <span class="icon">🔍</span> Similares
          </button>
          <button class="act-btn ctx" onclick="sendQuick('3')" title="Fazer nova busca">
            <span class="icon">📋</span> Nova busca
          </button>
        </div>

        <div class="action-sep"></div>

        <!-- Exemplos rápidos -->
        <div class="action-group">
          <button class="act-btn" onclick="fillInput('cabo embreagem palio')" title="Exemplo de busca">
            <span class="icon">⚡</span> Exemplo
          </button>
          <button class="act-btn" onclick="sendQuick('/stats')" title="Estatísticas do banco">
            <span class="icon">📊</span> Stats
          </button>
        </div>

      </div>

      <div id="chat"></div>

      <div id="input-area">
        <div class="input-row">
          <textarea
            id="user-input"
            placeholder="Ex: cabo embreagem palio 2006, oem 55204912…"
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>

    </div>

    <div id="toast"></div>

    <script>
      const API_BASE = window.location.protocol === "file:" ? "http://localhost:8080" : "";
      const API_URL  = API_BASE + "/chat";
      const PING_URL = API_BASE + "/ping";

      let isWaiting = false;
      let serverOk  = null;

      // ── INIT ──────────────────────────────────────────────
      window.addEventListener("DOMContentLoaded", async () => {
        addBotMessage(
          `🔧 Bem-vindo ao AutoFlex OEM\n\n` +
          `Sou seu assistente de catálogo de peças. Você pode buscar por:\n\n` +
          `• Descrição → cabo embreagem palio 2006\n` +
          `• Código SKU → 4002\n` +
          `• Referência OEM → oem 55204912\n\n` +
          `Use os botões acima ou digite sua busca.`,
          true
        );
        document.getElementById("user-input").focus();
        await checkServer();
      });

      // ── SERVER HEALTH ─────────────────────────────────────
      async function checkServer() {
        try {
          const r = await fetch(PING_URL);
          if (r.ok) {
            const d = await r.json();
            setServerStatus(true, d.pecas ? `${Number(d.pecas).toLocaleString("pt-BR")} peças` : "online");
            return true;
          }
        } catch (_) {}
        setServerStatus(false);
        return false;
      }

      function setServerStatus(ok, info = "") {
        serverOk = ok;
        const dot    = document.getElementById("status-dot");
        const label  = document.getElementById("status-label");
        const banner = document.getElementById("error-banner");
        if (ok) {
          dot.style.background  = "#22c55e";
          dot.style.boxShadow   = "0 0 8px #22c55e";
          label.textContent     = info || "online";
          label.style.color     = "var(--text-mid)";
          banner.classList.remove("show");
        } else {
          dot.style.background  = "#ef4444";
          dot.style.boxShadow   = "0 0 8px #ef4444";
          label.textContent     = "offline";
          label.style.color     = "#ef4444";
          banner.classList.add("show");
        }
      }

      // ── RENDER ────────────────────────────────────────────
      function renderText(text) {
        return text
          .replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/\*(.*?)\*/g, "<strong>$1</strong>")
          .replace(/\n/g, "<br>");
      }

      function addBotMessage(text) {
        const chat = document.getElementById("chat");
        const wrap = document.createElement("div");
        wrap.className = "msg bot";

        const label = document.createElement("div");
        label.className = "msg-label";
        label.textContent = "AUTOFLEX";
        wrap.appendChild(label);

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = renderText(text);
        wrap.appendChild(bubble);

        chat.appendChild(wrap);
        scrollBottom();
      }

      function addUserMessage(text) {
        const chat = document.getElementById("chat");
        const wrap = document.createElement("div");
        wrap.className = "msg user";

        const label = document.createElement("div");
        label.className = "msg-label";
        label.textContent = "VOCÊ";
        wrap.appendChild(label);

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;
        wrap.appendChild(bubble);

        chat.appendChild(wrap);
        scrollBottom();
      }

      function addTyping() {
        const chat = document.getElementById("chat");
        const wrap = document.createElement("div");
        wrap.className = "msg bot"; wrap.id = "typing-wrap";
        const label = document.createElement("div");
        label.className = "msg-label"; label.textContent = "AUTOFLEX";
        wrap.appendChild(label);
        const ind = document.createElement("div");
        ind.className = "typing-indicator";
        ind.innerHTML = "<span></span><span></span><span></span>";
        wrap.appendChild(ind);
        chat.appendChild(wrap);
        scrollBottom();
      }
      function removeTyping() {
        const el = document.getElementById("typing-wrap");
        if (el) el.remove();
      }

      function scrollBottom() {
        const c = document.getElementById("chat");
        c.scrollTop = c.scrollHeight;
      }

      // ── SEND ──────────────────────────────────────────────
      async function sendMessage() {
        if (isWaiting) return;
        const inp  = document.getElementById("user-input");
        const text = inp.value.trim();
        if (!text) return;

        addUserMessage(text);
        inp.value = "";
        autoResize(inp);

        const formData = new FormData();
        formData.append("message", text);

        setWaiting(true);
        addTyping();

        try {
          const resp = await fetch(API_URL, {
            method: "POST",
            body: formData,
            credentials: "include",
          });
          removeTyping();
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            addBotMessage(`❌ Erro ${resp.status}: ${err.error || resp.statusText}`);
            return;
          }
          const data = await resp.json();
          addBotMessage(data.response || "(resposta vazia)");
          if (!serverOk) setServerStatus(true);
        } catch (err) {
          removeTyping();
          setServerStatus(false);
          addBotMessage(
            `❌ Não foi possível conectar ao servidor.\n\n` +
            `Verifique se o backend está rodando:\n` +
            `  python app.py\n\n` +
            `Detalhe: ${err.message}`
          );
        } finally {
          setWaiting(false);
        }
      }

      // Envia texto diretamente (botões fixos)
      function sendQuick(text) {
        const inp = document.getElementById("user-input");
        inp.value = text;
        sendMessage();
      }

      // Preenche o input sem enviar (botão Exemplo)
      function fillInput(text) {
        const inp = document.getElementById("user-input");
        inp.value = text;
        inp.focus();
        autoResize(inp);
      }

      // ── UI ────────────────────────────────────────────────
      function setWaiting(val) {
        isWaiting = val;
        document.getElementById("send-btn").disabled = val;
      }
      function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }
      function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 120) + "px";
      }
      function showToast(msg, duration = 2500) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), duration);
      }

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden && !serverOk) checkServer();
      });
    </script>
  </body>
</html>
